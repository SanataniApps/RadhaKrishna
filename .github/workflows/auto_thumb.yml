name: Auto Generate Thumbnails

on:
  # 1. Jab bhi 'main' branch par kuch push hoga, ye auto chalega
  push:
    branches:
      - main
  # 2. ⭐ NAYA: Ye line tumhe GitHub par ek "Button" degi manually run karne ke liye
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Libraries
        run: pip install Pillow opencv-python-headless

      - name: Run Thumbnail Generator Script
        run: python generate_thumbs.py

      - name: Commit and Push New Thumbnails
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Agar koi nayi thumb bani hai toh commit karke push karega, nahi toh chhod dega
          git commit -m "Auto-generated thumbnails [skip ci]" || echo "No new thumbnails to commit"
          git push
