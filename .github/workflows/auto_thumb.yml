name: Auto Generate Thumbnails

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # ⭐ NAYA: Warning hatane ke liye v4 kiya

      - name: Setup Python
        uses: actions/setup-python@v5 # ⭐ NAYA: Warning hatane ke liye v5 kiya
        with:
          python-version: '3.x'

      - name: Install Python Libraries
        # Numpy add kiya taaki video processing me koi internal error na aaye
        run: pip install Pillow opencv-python-headless numpy

      - name: Run Thumbnail Generator Script
        run: python generate_thumbs.py

      - name: Commit and Push New Thumbnails
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # ⭐ SMART FIX: Pehle check karega ki koi nayi photo bani bhi hai ya nahi.
          # Agar nahi bani hogi toh error nahi dega, chupchaap pass ho jayega!
          if git diff-index --quiet HEAD; then
            echo "Koi nayi thumbnail nahi mili, sab pehle se set hai. ✅"
          else
            git commit -m "Auto-generated thumbnails [skip ci]"
            git pull --rebase origin main   # ⭐ YAHAN ADD KI HAI YE LINE
            git push
            echo "Nayi thumbnails save ho gayi hain! 🚀"
          fi
