name: Auto Generate JSON

# Ye robot tab chalega jab in folders mein kuch naya aayega, YA jab aap manually button dabayenge
on:
  push:
    branches:
      - main
    paths:
      - 'Status/**'
      - 'RadhaKrishna/**'
      - 'Others/**'
      - 'Radha/**'
      - 'Krishna/**'
  workflow_dispatch: # <--- ⭐ YE HAI WO JADUI LINE JO BUTTON LAAYEGI ⭐

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run JSON Generator Script
        run: python generate_json.py

      - name: Commit and Push New JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add wallpapers.json
          git commit -m "Auto-generated wallpapers.json by Robot" || echo "No changes to commit"
          git push
